<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,100..1000,96,468,79,-203,738,514,712&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <script src="./scripts.js"></script>

    <title>DevClub - Conversor de Moedas</title>
</head>

<body>
    <img class="logo" src="./assets/logo.gif" alt="Logo do DevClub" loading="lazy">
    <main>
        <label>
            Converter <b>de</b>
            <select id="currency-from">
                <option value="BRL">R$ Real Brasileiro</option>
                <option value="USD">USD Dólar Americano</option>
                <option value="EUR">EUR Euro</option>
            </select>
        </label>

        <label>
            Converter <b>para</b>
            <select id="currency-to">
                <option value="BRL">R$ Real Brasileiro</option>
                <option value="USD">USD Dólar Americano</option>
                <option value="EUR">EUR Euro</option>
            </select>
        </label>

        <label>
            Valor
            <input class="input-currency" placeholder="1,00">

        </label>

        <button class="convert-button"> Converter</button>

        <section>
            <div class="currency-box">

                <img class="currency-source-img" src="./assets/real.png" alt="Imagem de Real Brasileiro" loading="lazy">
                <p class="currency currency-source-label">Real</p>
                <p class="currency-value currency-value-to-convert">R$0,00</p>
            </div>

            <img class="arrow-img" src="./assets/arrow.png" alt="Imagem de seta indicando a conversão" loading="lazy">


            <div class="currency-box">
                <img class="currency-converted-img" src="./assets/dolar.png" alt="Imagem de Dólar Americano" loading="lazy">
                <p class="currency currency-converted-label">Dólar Americano</p>
                <p class="currency-value currency-value-converted">USD0,00</p>
            </div>


        </section>



    </main>

</body>

</html>
